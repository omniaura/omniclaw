name: Update OpenCode

on:
  schedule:
    # Run daily at 7am UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Get current versions
        id: current
        run: |
          CLI=$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('container/Dockerfile').read_text()
          match = re.search(r'ARG OPENCODE_VERSION=([^\s]+)', text)
          print(match.group(1) if match else '')
          PY
          )
          SDK=$(python3 - <<'PY'
          import json
          from pathlib import Path

          package = json.loads(Path('container/agent-runner/package.json').read_text())
          print(package['dependencies']['@opencode-ai/sdk'].lstrip('^'))
          PY
          )
          echo "cli=$CLI" >> $GITHUB_OUTPUT
          echo "sdk=$SDK" >> $GITHUB_OUTPUT
          echo "Current CLI: $CLI, SDK: $SDK"

      - name: Get latest versions
        id: latest
        run: |
          CLI=$(gh api repos/sst/opencode/releases/latest --jq '.tag_name | ltrimstr("v")')
          SDK=$(curl -fsSL https://registry.npmjs.org/@opencode-ai/sdk/latest | jq -r '.version')
          echo "cli=$CLI" >> $GITHUB_OUTPUT
          echo "sdk=$SDK" >> $GITHUB_OUTPUT
          echo "Latest CLI: $CLI, SDK: $SDK"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if update needed
        id: check
        run: |
          CLI_CHANGED=false
          SDK_CHANGED=false
          CLI_TRACKED=false
          if [ -n "${{ steps.current.outputs.cli }}" ]; then
            CLI_TRACKED=true
          fi
          if [ "$CLI_TRACKED" == "true" ] && [ "${{ steps.current.outputs.cli }}" != "${{ steps.latest.outputs.cli }}" ]; then
            CLI_CHANGED=true
          fi
          if [ "${{ steps.current.outputs.sdk }}" != "${{ steps.latest.outputs.sdk }}" ]; then
            SDK_CHANGED=true
          fi

          BRANCH_SUFFIX=""
          COMMIT_TITLE=""
          if [ "$CLI_CHANGED" == "true" ] && [ "$SDK_CHANGED" == "true" ]; then
            BRANCH_SUFFIX="cli-${{ steps.latest.outputs.cli }}-sdk-${{ steps.latest.outputs.sdk }}"
            COMMIT_TITLE="chore(container): bump opencode cli to ${{ steps.latest.outputs.cli }} and sdk to ${{ steps.latest.outputs.sdk }}"
          elif [ "$CLI_CHANGED" == "true" ]; then
            BRANCH_SUFFIX="cli-${{ steps.latest.outputs.cli }}"
            COMMIT_TITLE="chore(container): bump opencode cli to ${{ steps.latest.outputs.cli }}"
          elif [ "$SDK_CHANGED" == "true" ]; then
            BRANCH_SUFFIX="sdk-${{ steps.latest.outputs.sdk }}"
            COMMIT_TITLE="chore(container): bump opencode sdk to ${{ steps.latest.outputs.sdk }}"
          fi

          CHANGED=$([[ "$CLI_CHANGED" == "true" || "$SDK_CHANGED" == "true" ]] && echo "true" || echo "false")
          echo "cli_tracked=$CLI_TRACKED" >> $GITHUB_OUTPUT
          echo "cli_changed=$CLI_CHANGED" >> $GITHUB_OUTPUT
          echo "sdk_changed=$SDK_CHANGED" >> $GITHUB_OUTPUT
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "branch_suffix=$BRANCH_SUFFIX" >> $GITHUB_OUTPUT
          echo "commit_title=$COMMIT_TITLE" >> $GITHUB_OUTPUT
          echo "CLI tracked: $CLI_TRACKED, CLI changed: $CLI_CHANGED, SDK changed: $SDK_CHANGED"

      - name: Check for existing PR
        id: existing_pr
        if: steps.check.outputs.changed == 'true'
        run: |
          PR=$(gh pr list --repo omniaura/omniclaw --base main --head update/opencode-${{ steps.check.outputs.branch_suffix }} --json number --jq '.[0].number // ""')
          echo "pr=$PR" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply updates
        if: steps.check.outputs.changed == 'true' && steps.existing_pr.outputs.pr == ''
        run: |
          if [ "${{ steps.check.outputs.cli_changed }}" == "true" ]; then
            sed -i "s/ARG OPENCODE_VERSION=${{ steps.current.outputs.cli }}/ARG OPENCODE_VERSION=${{ steps.latest.outputs.cli }}/" container/Dockerfile
          fi
          if [ "${{ steps.check.outputs.sdk_changed }}" == "true" ]; then
            sed -i "s|\"@opencode-ai/sdk\": \"\\^${{ steps.current.outputs.sdk }}\"|\"@opencode-ai/sdk\": \"^${{ steps.latest.outputs.sdk }}\"|" container/agent-runner/package.json
            cd container/agent-runner
            bun update @opencode-ai/sdk
            cd ../..
          fi

      - name: Commit and open PR
        if: steps.check.outputs.changed == 'true' && steps.existing_pr.outputs.pr == ''
        run: |
          BRANCH="update/opencode-${{ steps.check.outputs.branch_suffix }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          CHANGED_FILES=""
          if [ "${{ steps.check.outputs.cli_changed }}" == "true" ]; then
            CHANGED_FILES="container/Dockerfile"
          fi
          if [ "${{ steps.check.outputs.sdk_changed }}" == "true" ]; then
            CHANGED_FILES="$CHANGED_FILES container/agent-runner/package.json container/agent-runner/bun.lock"
          fi
          CHANGED_FILES=$(echo $CHANGED_FILES | xargs)
          git add $CHANGED_FILES
          git commit -m "${{ steps.check.outputs.commit_title }}"
          git push origin "$BRANCH"

          BODY_FILE=$(mktemp)
          printf '## OpenCode update\n\n' > "$BODY_FILE"
          if [ "${{ steps.check.outputs.cli_changed }}" == "true" ]; then
            printf -- '- **CLI**: `%s` → `%s` (Dockerfile `OPENCODE_VERSION`)\n' "${{ steps.current.outputs.cli }}" "${{ steps.latest.outputs.cli }}" >> "$BODY_FILE"
          fi
          if [ "${{ steps.check.outputs.sdk_changed }}" == "true" ]; then
            printf -- '- **SDK**: `%s` → `%s` (`@opencode-ai/sdk`)\n' "${{ steps.current.outputs.sdk }}" "${{ steps.latest.outputs.sdk }}" >> "$BODY_FILE"
          fi
          printf '\nMerging will not auto-rebuild the container — run `just update-container` after merge.\n' >> "$BODY_FILE"

          gh pr create \
            --repo omniaura/omniclaw \
            --base main \
            --head "$BRANCH" \
            --title "${{ steps.check.outputs.commit_title }}" \
            --body-file "$BODY_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
